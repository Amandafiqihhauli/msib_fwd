<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 3 JS</title>

    <style>
        table{
        border-collapse: collapse;
        margin-top:20px;
        }

        th,td{
        border:1px solid black;
        padding:8px;
        text-align:center;
        }
    </style>
</head>
<body>
    <h2 align="center">Sistem Manajemen Produk</h2>
    <form action="">
        <h3>Tambah Produk </h3>
        <label for="">Nama Produk: </label>
        <input type="text" id="nama"> <br><br>

        <label for="">Harga:</label>
        <input type="number" id="harga"> <br><br>

        <label for="">Stok:</label>
        <input type="number" id="stok"><br><br>
        <button onclick="tambahProduk()">Tambah Produk</button>
        <br><br><br>

        <h3>Hapus Produk</h3>
        <label for="">ID Produk:</label><br><br>
        <input type="number" id="hapusId"> <br><br>
        <button onclick="hapusProduk()">Hapus</button><br><br><br>

        <h3>Daftar Produk</h3>
        <div id="tabelProduk"></div> 

        <script>
            let produkToko = [
                {id:1,nama:"Laptop",harga:7000000,stok:5},
                {id:2,nama:"Mouse",harga:200000,stok:10},
                {id:3,nama:"Keyboard",harga:350000,stok:7}
            ];

            // TAMBAH PRODUK
            function tambahProduk(){
                let nama = document.getElementById('nama').value;
                let harga = parseInt(document.getElementById('harga').value);
                let stok = parseInt(document.getElementById('stok').value);

                let idBaru = produkToko.length + 1;

                let produkBaru = {
                    id:idBaru,
                    nama:nama,
                    harga:harga,
                    stok:stok
                };
                produkToko.push(produkBaru);
                tampilkanProduk();
            };

            // HAPUS PRODUK
            function hapusProduk(){
                let id = parseInt(document.getElementById('hapusId').value);

                produkToko = produkToko.filter(function(p){
                    return p.id !== id;
                });

                tampilkanProduk();
                }

            // TAMPILKAN PRODUK
            function tampilkanProduk(){
                let tabel = '<table>';
                    tabel += '<tr><th>ID</th><th>Nama</th><th>Harga</th><th>Stok</th></tr>';

                produkToko.forEach(function(p){
                    tabel += '<tr>';
                    tabel += '<td>'+p.id+'</td>';
                    tabel += '<td>'+p.nama+'</td>';
                    tabel += '<td>'+p.harga+'</td>';
                    tabel += '<td>'+p.stok+'</td>';
                    tabel += '</tr>';
                });

                tabel += '</table>';
                document.getElementById('tabelProduk').innerHTML = tabel;
                };
                
                tampilkanProduk();


        </script>

    </form>
</body>
</html>
