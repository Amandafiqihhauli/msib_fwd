<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 1 JS</title>
</head>
<body>

    <h2>Perhitungan Bangun Datar dengan JavaScript</h2>

    <script>
    //Fungsi untuk menghitung luas persegi panjang
    // rumus: panjang * lebar 
    function luasPersegiPanjang(panjang, lebar){
        return panjang * lebar;
    }    

    // Fungsi untuk menghitung luas persegi
    // rumus: sisi × sisi
    function luasPersegi(sisi){
        return sisi * sisi;
    }


    // Fungsi untuk menghitung luas segitiga
    // rumus: 1/2 × alas × tinggi
    function luasSegitiga(alas, tinggi){
        return 0.5 * alas * tinggi;
    }


    // nilai parameter
    let panjang = 7;
    let lebar = 8;
    let sisi = 5;
    let alas = 10;
    let tinggi = 6;


    // menampilkan hasil ke halaman web
    document.write("Luas Persegi Panjang: " + luasPersegiPanjang(panjang, lebar) + "<br>");
    document.write("Luas persegi: " + luasPersegi(sisi) + "<br>");
    document.write("Luas segitiga: " + luasSegitiga(alas, tinggi));

    </script>

</body>
</html>
